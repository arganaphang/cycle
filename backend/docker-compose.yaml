services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
    ports:
      - "5432:5432"
    restart: always
    networks:
      - application_network
    tmpfs:
      - /var/lib/postgresql/data
      - /tmp
    command:
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  electric:
    image: docker.io/electricsql/electric:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://${DATABASE_USER}:${DATABASE_PASS}@postgres:5432/${DAT\
        ABASE_NAME}?sslmode=disable"
      ELECTRIC_INSECURE: true
    ports:
      - "4000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - application_network
networks:
  application_network:
    driver: bridge
