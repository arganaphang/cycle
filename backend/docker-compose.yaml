services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
    ports:
      - "5432:5432"
    restart: always
    networks:
      - application_network
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
  backend:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      PORT: "8000"
    expose:
      - "8000"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - application_network
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - application_network
networks:
  application_network:
    driver: bridge
