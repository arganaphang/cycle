schema {
  query: Query
  mutation: Mutation
}

"""
Directs the executor to defer this fragment when the `if` argument is true or undefined.
"""
directive @defer(
  """
  Deferred when true or undefined.
  """
  if: Boolean = true
  """
  Unique name
  """
  label: String
) on FRAGMENT_SPREAD | INLINE_FRAGMENT

directive @public on FIELD_DEFINITION

type AuthPayload {
  token: String!
  user: User!
}

input CreatePatientInput {
  address: String
  date_of_birth: Time!
  email: String
  emergency_contact: EmergencyContactInput
  full_name: String!
  gender: Gender!
  phone: String
}

input CreateStaffInput {
  full_name: String!
  license_no: String
  phone: String
  specialization: String
  user_id: UUID!
}

input CreateTreatmentSessionInput {
  patient_id: UUID!
  session_date: Time!
  staff_id: UUID!
}

input CreateTreatmentSessionReportInput {
  actual_condition: String
  anamnesis: String
  diagnosis: String
  examination: String
  intervention: String
  mechanism_of_injury: String
  planning_and_education: String
  session_id: UUID!
}

input CreateUserInput {
  email: String!
  password: String!
  role: UserRole!
}

type EmergencyContact {
  name: String!
  phone: String!
  relation: String!
}

input EmergencyContactInput {
  name: String!
  phone: String!
  relation: String!
}

enum Gender {
  FEMALE
  MALE
}

input LoginInput {
  email: String!
  password: String!
}

type Mutation {
  createPatient(input: CreatePatientInput!): Patient!
  createStaff(input: CreateStaffInput!): Staff!
  createTreatmentSession(input: CreateTreatmentSessionInput!): TreatmentSession!
  createTreatmentSessionReport(input: CreateTreatmentSessionReportInput!): TreatmentSessionReport!
  createUser(input: CreateUserInput!): User!
  login(input: LoginInput!): AuthPayload!
  updatePatient(id: UUID!, input: UpdatePatientInput!): Patient!
  updateStaff(id: UUID!, input: UpdateStaffInput!): Staff!
  updateTreatmentSessionReport(
    id: UUID!
    input: UpdateTreatmentSessionReportInput!
  ): TreatmentSessionReport!
  updateTreatmentSessionStatus(
    id: UUID!
    input: UpdateTreatmentSessionStatusInput!
  ): TreatmentSession!
  updateUser(id: UUID!, input: UpdateUserInput!): User!
}

type Patient {
  address: String
  created_at: Time!
  date_of_birth: Time!
  email: String
  emergency_contact: EmergencyContact
  full_name: String!
  gender: Gender!
  id: UUID!
  medical_record_no: String!
  phone: String
  treatment_sessions: [TreatmentSession!]!
  updated_at: Time!
}

type PatientConnection {
  nodes: [Patient!]!
  total_count: Int!
}

enum PatientSortField {
  CREATED_AT
  DATE_OF_BIRTH
  FULL_NAME
  GENDER
  MEDICAL_RECORD_NO
}

type Pong {
  success: Boolean!
}

type Query {
  me: User!
  patient(id: UUID!): Patient
  patients(
    limit: Int
    offset: Int
    search: String
    sortBy: PatientSortField
    sortOrder: SortOrder
  ): PatientConnection!
  ping: Pong!
  staff(id: UUID!): Staff
  staffs(
    limit: Int
    offset: Int
    search: String
    sortBy: StaffSortField
    sortOrder: SortOrder
  ): StaffConnection!
  treatmentSession(id: UUID!): TreatmentSession
  treatmentSessionReport(id: UUID!): TreatmentSessionReport
  treatmentSessionReports(
    filter: ReportFilter
    limit: Int
    offset: Int
    sortBy: TreatmentSessionReportSortField
    sortOrder: SortOrder
  ): TreatmentSessionReportConnection!
  treatmentSessions(
    filter: SessionFilter
    limit: Int
    offset: Int
    sortBy: TreatmentSessionSortField
    sortOrder: SortOrder
  ): TreatmentSessionConnection!
}

input ReportFilter {
  date_from: Time
  date_to: Time
  """
  Matches patient name, session number, or report text fields.
  """
  search: String
}

input SessionFilter {
  date_from: Time
  date_to: Time
  patient_id: UUID
  """
  Matches patient name, therapist name, or session number.
  """
  search: String
  staff_id: UUID
  status: SessionStatus
}

enum SessionStatus {
  CANCELLED
  COMPLETED
  IN_PROGRESS
  SCHEDULED
}

enum SortOrder {
  ASC
  DESC
}

type Staff {
  created_at: Time!
  full_name: String!
  id: UUID!
  license_no: String
  phone: String
  specialization: String
  treatment_sessions: [TreatmentSession!]!
  updated_at: Time!
  user: User!
  user_id: UUID!
}

type StaffConnection {
  nodes: [Staff!]!
  total_count: Int!
}

enum StaffSortField {
  CREATED_AT
  EMAIL
  FULL_NAME
  LICENSE_NO
  PHONE
  SPECIALIZATION
}

scalar Time

type TreatmentSession {
  created_at: Time!
  id: UUID!
  note: String
  patient: Patient!
  patient_id: UUID!
  report: TreatmentSessionReport
  session_date: Time!
  session_no: Int!
  staff: Staff!
  staff_id: UUID!
  status: SessionStatus!
  updated_at: Time!
}

type TreatmentSessionConnection {
  nodes: [TreatmentSession!]!
  total_count: Int!
}

type TreatmentSessionReport {
  actual_condition: String
  anamnesis: String
  created_at: Time!
  diagnosis: String
  examination: String
  id: UUID!
  intervention: String
  mechanism_of_injury: String
  planning_and_education: String
  session_id: UUID!
  treatment_session: TreatmentSession!
  updated_at: Time!
}

type TreatmentSessionReportConnection {
  nodes: [TreatmentSessionReport!]!
  total_count: Int!
}

enum TreatmentSessionReportSortField {
  CREATED_AT
  DIAGNOSIS
  PATIENT_NAME
  SESSION_DATE
}

enum TreatmentSessionSortField {
  CREATED_AT
  PATIENT_NAME
  SESSION_DATE
  SESSION_NO
  STAFF_NAME
  STATUS
}

scalar UUID

input UpdatePatientInput {
  address: String
  email: String
  emergency_contact: EmergencyContactInput
  full_name: String
  phone: String
}

input UpdateStaffInput {
  full_name: String
  license_no: String
  phone: String
  specialization: String
}

input UpdateTreatmentSessionReportInput {
  actual_condition: String
  anamnesis: String
  diagnosis: String
  examination: String
  intervention: String
  mechanism_of_injury: String
  planning_and_education: String
}

input UpdateTreatmentSessionStatusInput {
  status: SessionStatus!
}

input UpdateUserInput {
  email: String
  password: String
  role: UserRole
}

type User {
  created_at: Time!
  email: String!
  id: UUID!
  is_active: Boolean!
  role: UserRole!
  staff: Staff
  updated_at: Time!
}

enum UserRole {
  ADMIN
  RECEPTIONIST
  THERAPIST
}
